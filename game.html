<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小车跑酷 - 快乐运动</title>
    <style>
        /* 基础样式 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none; /* 禁用系统手势 */
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #fff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 24px;
            overflow: hidden;
            border: 8px solid white;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        /* UI 覆盖层 */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 分数面板 */
        .score-board {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .badge {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-weight: bold;
            font-size: 20px;
            color: #334155;
        }

        /* 菜单界面 */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 24px;
            text-align: center;
            pointer-events: auto;
            transition: opacity 0.3s;
        }

        #start-screen {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }

        #gameover-screen {
            background: rgba(239, 68, 68, 0.85);
            backdrop-filter: blur(8px);
            display: none;
        }

        h1 { font-size: 40px; margin-bottom: 16px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        h2 { font-size: 48px; margin-bottom: 8px; font-weight: 900; }
        p { font-size: 18px; margin-bottom: 32px; opacity: 0.9; line-height: 1.5; }

        .btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn:active { transform: scale(0.95); }

        #gameover-screen .btn { background: white; color: #ef4444; }

        .score-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 32px;
            width: 80%;
        }

        .final-score { font-size: 64px; font-weight: 900; margin: 8px 0; }

        /* 适配移动端 */
        @media (max-width: 450px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div class="score-board">
            <div class="badge">💰 <span id="current-score">0</span></div>
            <div class="badge">🏆 <span id="high-score">0</span></div>
        </div>

        <!-- 开始界面 -->
        <div id="start-screen" class="screen">
            <h1>小车跑酷</h1>
            <p>点击屏幕或按空格键跳跃<br>躲避障碍物，收集金币！</p>
            <button class="btn" onclick="startGame()">▶ 开始游戏</button>
        </div>

        <!-- 结束界面 -->
        <div id="gameover-screen" class="screen">
            <h2>游戏结束</h2>
            <div class="score-card">
                <div style="opacity: 0.8">本次得分</div>
                <div class="final-score" id="final-score">0</div>
                <div style="font-size: 14px; opacity: 0.8">最高纪录: <span id="record-score">0</span></div>
            </div>
            <button class="btn" onclick="startGame()">🔄 再玩一次</button>
        </div>
    </div>
</div>

    avatarImg.onload = () => {
        state.playerImage = avatarImg;
    };

    highScoreEl.innerText = state.highScore;

    function startGame() {
        state.gameState = 'PLAYING';
        state.playerY = canvas.height - CONFIG.GROUND_HEIGHT - CONFIG.PLAYER_SIZE;
        state.playerVY = 0;
        state.jumpsCount = 0;
        state.policeX = -10;
        state.stunTimer = 0;
        state.jetpackTimer = 0;
        state.lives = 3;
        state.obstacleCount = 0;
        state.boostPads = [];
        state.jetpacks = [];
        state.obstacles = [];
        state.coins = [];
        state.frame = 0;
        state.score = 0;
        
        scoreEl.innerText = '0';
        startScreen.style.display = 'none';
        gameoverScreen.style.display = 'none';
        
        requestAnimationFrame(gameLoop);
    }

    function jump() {
        if (state.gameState !== 'PLAYING') return;
        if (state.jumpsCount < 4) {
            state.playerVY = CONFIG.JUMP_FORCE;
            state.jumpsCount++;
        }
    }

    // 输入监听
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (state.gameState === 'PLAYING') jump();
            else startGame();
        }
    });
    canvas.addEventListener('mousedown', jump);
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
    });

    function gameLoop() {
        if (state.gameState !== 'PLAYING') return;

        update();
        draw();

        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (state.gameState !== 'PLAYING') return;

        state.frame++;
        const groundY = canvas.height - CONFIG.GROUND_HEIGHT;

        // 1. 物理更新
        if (state.jetpackTimer > 0) {
            state.playerY = 200; // 悬空高度
            state.playerVY = 0;
        } else {
            state.playerVY += CONFIG.GRAVITY;
            state.playerY += state.playerVY;
        }

        if (state.playerY > groundY - CONFIG.PLAYER_SIZE) {
            state.playerY = groundY - CONFIG.PLAYER_SIZE;
            state.playerVY = 0;
            state.jumpsCount = 0;
        }

        // 2. 警车逻辑
        if (state.stunTimer > 0) {
            // 只有在玩家被暂停（碰到尖刺）时，警车才靠近
            state.policeX += 0.15; 
        }
        
        // 喷气背包期间警车退后
        if (state.jetpackTimer > 0) {
            if (state.policeX > -10) state.policeX -= 0.5;
            state.jetpackTimer--;
        }
        
        // 修复 Bug: 只有在玩家没有处于眩晕状态时，警车才能抓到玩家
        if (state.stunTimer === 0 && state.policeX >= 50 - CONFIG.PLAYER_SIZE) {
            if (state.lives > 1) {
                state.lives--;
                state.policeX = -20; // 损失一条命，警车退回更远一点
            } else {
                gameOver();
                return;
            }
        }

        // 3. 暂停逻辑
        if (state.stunTimer > 0) {
            state.stunTimer--;
            draw();
            requestAnimationFrame(gameLoop);
            return;
        }

        // 4. 生成障碍物 (尖刺)
        if (state.frame % 100 === 0) {
            state.obstacleCount++;
            if (state.obstacleCount % 15 === 0) {
                state.jetpacks.push({
                    x: canvas.width,
                    y: 150 + Math.random() * 100,
                    collected: false
                });
            } else if (state.obstacleCount % 10 === 0) {
                state.boostPads.push({
                    x: canvas.width,
                    w: CONFIG.BOOST_PAD_WIDTH,
                    collected: false
                });
            } else {
                state.obstacles.push({
                    x: canvas.width,
                    w: 40,
                    h: 30
                });
            }
        }

        // 5. 生成金币
        if (state.frame % 60 === 0) {
            const isHigh = Math.random() > 0.6;
            const coinY = isHigh 
                ? 100 + Math.random() * 100
                : groundY - 100 - Math.random() * 150;

            state.coins.push({
                x: canvas.width,
                y: coinY,
                collected: false
            });
        }

        // 6. 移动 (如果被暂停，马路不滚动)
        if (state.stunTimer === 0) {
            state.obstacles.forEach(o => o.x -= CONFIG.OBSTACLE_SPEED);
            state.coins.forEach(c => c.x -= CONFIG.OBSTACLE_SPEED);
            state.boostPads.forEach(p => p.x -= CONFIG.OBSTACLE_SPEED);
            state.jetpacks.forEach(jp => jp.x -= CONFIG.OBSTACLE_SPEED);
        }

        // 7. 清理
        state.obstacles = state.obstacles.filter(o => o.x + o.w > 0);
        state.coins = state.coins.filter(c => c.x + CONFIG.COIN_SIZE > 0);
        state.boostPads = state.boostPads.filter(p => p.x + p.w > 0);
        state.jetpacks = state.jetpacks.filter(jp => jp.x + CONFIG.JETPACK_SIZE > 0);

        // 8. 碰撞检测 - 尖刺
        if (state.jetpackTimer === 0) {
            for (let i = 0; i < state.obstacles.length; i++) {
                const o = state.obstacles[i];
                if (50 + CONFIG.PLAYER_SIZE > o.x && 50 < o.x + o.w && 
                    state.playerY + CONFIG.PLAYER_SIZE > groundY - o.h) {
                    // 扣除生命
                    if (state.lives > 1) {
                        state.lives--;
                        state.stunTimer = 120;
                        state.policeX = -20; // 撞到尖刺时，警车也退后一点，防止瞬间双重扣血
                    } else {
                        gameOver();
                        return;
                    }
                    state.obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        // 9. 碰撞检测 - 金币
        for (let c of state.coins) {
            if (!c.collected && 50 + CONFIG.PLAYER_SIZE > c.x && 50 < c.x + CONFIG.COIN_SIZE &&
                state.playerY < c.y + CONFIG.COIN_SIZE && state.playerY + CONFIG.PLAYER_SIZE > c.y) {
                c.collected = true;
                state.score += 10;
                scoreEl.innerText = state.score;
            }
        }

        // 10. 碰撞检测 - 加速带
        for (let p of state.boostPads) {
            if (!p.collected && 50 + CONFIG.PLAYER_SIZE > p.x && 50 < p.x + p.w &&
                state.playerY + CONFIG.PLAYER_SIZE > groundY - CONFIG.BOOST_PAD_HEIGHT) {
                p.collected = true;
                state.lives++;
                state.policeX = -10;
                state.score += 50;
                scoreEl.innerText = state.score;
            }
        }

        // 11. 碰撞检测 - 喷气背包
        for (let jp of state.jetpacks) {
            if (!jp.collected && 50 + CONFIG.PLAYER_SIZE > jp.x && 50 < jp.x + CONFIG.JETPACK_SIZE &&
                state.playerY < jp.y + CONFIG.JETPACK_SIZE && state.playerY + CONFIG.PLAYER_SIZE > jp.y) {
                jp.collected = true;
                state.jetpackTimer = 300;
                state.score += 100;
                scoreEl.innerText = state.score;
            }
        }
    }

    function gameOver() {
        state.gameState = 'GAMEOVER';
        if (state.score > state.highScore) {
            state.highScore = state.score;
            localStorage.setItem('runner_high_score', state.highScore);
            highScoreEl.innerText = state.highScore;
        }
        finalScoreEl.innerText = state.score;
        recordScoreEl.innerText = state.highScore;
        gameoverScreen.style.display = 'flex';
    }

    function draw() {
        const groundY = canvas.height - CONFIG.GROUND_HEIGHT;

        // 背景 - 城市天空
        ctx.fillStyle = '#1a2a6c';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 绘制城市剪影
        const drawBuildings = (offset, speed, color, count, width, spacing) => {
            ctx.fillStyle = color;
            const totalWidth = count * spacing;
            for (let i = 0; i < count; i++) {
                let x = (i * spacing + state.frame * speed + offset) % totalWidth;
                if (x < 0) x += totalWidth;
                x -= spacing;
                
                const h = 120 + (Math.sin(i * 1.5 + offset) + 1) * 100;
                ctx.fillRect(x, groundY - h, width, h);
                // 窗户
                ctx.fillStyle = 'rgba(255, 255, 0, 0.2)';
                for (let j = 0; j < h / 25; j++) {
                    ctx.fillRect(x + 10, groundY - h + 10 + j * 25, 10, 10);
                    if (width > 30) {
                        ctx.fillRect(x + width - 20, groundY - h + 10 + j * 25, 10, 10);
                    }
                }
                ctx.fillStyle = color;
            }
        };
        // 远景
        drawBuildings(0, -0.3, '#1a252f', 15, 60, 80);
        // 中景
        drawBuildings(40, -0.7, '#2c3e50', 12, 70, 100);
        // 近景
        drawBuildings(20, -1.2, '#1c2833', 10, 80, 120);

        // 地面 - 马路
        ctx.fillStyle = '#333';
        ctx.fillRect(0, groundY, canvas.width, CONFIG.GROUND_HEIGHT);

        // 绘制加速带
        state.boostPads.forEach(p => {
            if (!p.collected) {
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(p.x, groundY - 5, p.w, 10, 5);
                } else {
                    ctx.rect(p.x, groundY - 5, p.w, 10);
                }
                ctx.fill();
                
                // 箭头
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    const ax = p.x + 15 + i * 15;
                    ctx.beginPath();
                    ctx.moveTo(ax, groundY);
                    ctx.lineTo(ax + 10, groundY - 5);
                    ctx.lineTo(ax, groundY - 10);
                    ctx.stroke();
                }
            }
        });
        
        // 马路虚线
        ctx.strokeStyle = 'white';
        ctx.setLineDash([30, 30]);
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(0, groundY + CONFIG.GROUND_HEIGHT / 2);
        ctx.lineTo(canvas.width, groundY + CONFIG.GROUND_HEIGHT / 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // 角色 (小汽车)
        const px = 50;
        const py = state.playerY;
        const size = CONFIG.PLAYER_SIZE;
        
        ctx.save();
        // 喷气效果 (火箭尾焰)
        if (state.jetpackTimer > 0) {
            ctx.save();
            const flicker = Math.random() * 10;
            const flameLen = 40 + flicker;
            
            const grad = ctx.createLinearGradient(px, py + 25, px - flameLen, py + 25);
            grad.addColorStop(0, '#f1c40f');
            grad.addColorStop(0.5, '#e67e22');
            grad.addColorStop(1, 'rgba(231, 76, 60, 0)');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(px, py + 15);
            ctx.lineTo(px - flameLen, py + 25);
            ctx.lineTo(px, py + 35);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(px, py + 20);
            ctx.lineTo(px - flameLen * 0.5, py + 25);
            ctx.lineTo(px, py + 30);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#e67e22';
            for (let i = 0; i < 3; i++) {
                const fx = px - 10 - Math.random() * 30;
                const fy = py + 20 + Math.random() * 10;
                ctx.beginPath();
                ctx.arc(fx, fy, 2 + Math.random() * 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        
        if (state.jetpackTimer > 0) {
            // 绘制小飞机
            ctx.save();
            ctx.translate(px, py);
            
            // 机身
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(0, 10, size + 5, 20, 10);
            } else {
                ctx.rect(0, 10, size + 5, 20);
            }
            ctx.fill();
            
            // 机翼
            ctx.fillStyle = '#2980b9';
            ctx.beginPath();
            ctx.moveTo(15, 10);
            ctx.lineTo(5, -5);
            ctx.lineTo(25, -5);
            ctx.lineTo(35, 10);
            ctx.fill();
            
            // 尾翼
            ctx.beginPath();
            ctx.moveTo(5, 10);
            ctx.lineTo(0, 0);
            ctx.lineTo(10, 0);
            ctx.lineTo(15, 10);
            ctx.fill();
            
            // 驾驶舱
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.arc(size - 5, 15, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        } else {
            // 车身
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(px, py + 10, size, size - 20, 5);
            } else {
                ctx.rect(px, py + 10, size, size - 20);
            }
            ctx.fill();
            // 车顶
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(px + 5, py, size - 15, 15, 5);
            } else {
                ctx.rect(px + 5, py, size - 15, 15);
            }
            ctx.fill();
            // 车窗
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(px + 10, py + 3, size - 25, 8);
            // 轮子
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(px + 10, py + size - 5, 6, 0, Math.PI * 2);
            ctx.arc(px + size - 10, py + size - 5, 6, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();

        // 障碍物 (尖刺)
        state.obstacles.forEach(o => {
            ctx.fillStyle = '#95a5a6';
            ctx.beginPath();
            const spikeCount = 3;
            const spikeWidth = o.w / spikeCount;
            for (let i = 0; i < spikeCount; i++) {
                ctx.moveTo(o.x + i * spikeWidth, groundY);
                ctx.lineTo(o.x + (i + 0.5) * spikeWidth, groundY - o.h);
                ctx.lineTo(o.x + (i + 1) * spikeWidth, groundY);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.stroke();
        });

        // 警车
        const pX = state.policeX;
        const pY = groundY - CONFIG.PLAYER_SIZE;
        ctx.save();
        ctx.fillStyle = '#2980b9'; // 蓝色
        ctx.beginPath();
        if (ctx.roundRect) {
            ctx.roundRect(pX, pY + 10, CONFIG.PLAYER_SIZE, CONFIG.PLAYER_SIZE - 20, 5);
        } else {
            ctx.rect(pX, pY + 10, CONFIG.PLAYER_SIZE, CONFIG.PLAYER_SIZE - 20);
        }
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(pX + 10, pY + 15, CONFIG.PLAYER_SIZE - 20, 10);
        const lightOn = Math.floor(state.frame / 10) % 2 === 0;
        ctx.fillStyle = lightOn ? '#e74c3c' : '#3498db';
        ctx.beginPath();
        if (ctx.roundRect) {
            ctx.roundRect(pX + 15, pY, CONFIG.PLAYER_SIZE - 30, 10, 2);
        } else {
            ctx.rect(pX + 15, pY, CONFIG.PLAYER_SIZE - 30, 10);
        }
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(pX + 10, pY + CONFIG.PLAYER_SIZE - 5, 6, 0, Math.PI * 2);
        ctx.arc(pX + CONFIG.PLAYER_SIZE - 10, pY + CONFIG.PLAYER_SIZE - 5, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // 金币
        state.coins.forEach(c => {
            if (!c.collected) {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(c.x + CONFIG.COIN_SIZE/2, c.y + CONFIG.COIN_SIZE/2, CONFIG.COIN_SIZE/2, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#B8860B';
                ctx.stroke();
            }
        });

        // 喷气背包
        state.jetpacks.forEach(jp => {
            if (!jp.collected) {
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(jp.x, jp.y, CONFIG.JETPACK_SIZE, CONFIG.JETPACK_SIZE, 5);
                } else {
                    ctx.rect(jp.x, jp.y, CONFIG.JETPACK_SIZE, CONFIG.JETPACK_SIZE);
                }
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillRect(jp.x + 5, jp.y + 5, CONFIG.JETPACK_SIZE - 10, 5);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(jp.x + 10, jp.y + 15, CONFIG.JETPACK_SIZE - 20, 10);
            }
        });

        // UI
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${state.score}`, 20, 40);
        
        // 绘制心形生命值
        const drawHeart = (x, y, size) => {
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            const topCurveHeight = size * 0.3;
            ctx.moveTo(x, y + topCurveHeight);
            // Left curve
            ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + topCurveHeight);
            // Left bottom
            ctx.bezierCurveTo(x - size / 2, y + (size + topCurveHeight) / 2, x, y + (size + topCurveHeight) / 2, x, y + size);
            // Right bottom
            ctx.bezierCurveTo(x, y + (size + topCurveHeight) / 2, x + size / 2, y + (size + topCurveHeight) / 2, x + size / 2, y + topCurveHeight);
            // Right curve
            ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + topCurveHeight);
            ctx.fill();
        };

        for (let i = 0; i < Math.min(state.lives, 5); i++) {
            drawHeart(35 + i * 30, 60, 25);
        }
        if (state.lives > 5) {
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText(`+${state.lives - 5}`, 20 + 5 * 25, 75);
        }
        ctx.textAlign = 'right';
        ctx.fillText(`HIGH: ${state.highScore}`, canvas.width - 20, 40);
    }

    // 初始绘制
    draw();
</script>
